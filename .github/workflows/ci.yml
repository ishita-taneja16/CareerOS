name: AI Career Copilot CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0

      - name: Install FastAPI Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/fastapi_app/requirements.txt
          pip install pytest httpx
          python -m spacy download en_core_web_sm

      - name: Run FastAPI Tests
        run: |
          cd backend/fastapi_app
          pytest tests/

      - name: Install Django Dependencies
        run: |
          pip install -r backend/django_app/requirements.txt

      - name: Run Django Tests
        run: |
          cd backend/django_app
          python manage.py test --noinput

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Django Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.django
          push: false

      - name: Build FastAPI Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.fastapi
          push: false
